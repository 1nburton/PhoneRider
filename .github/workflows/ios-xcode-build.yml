name: iOS Xcode Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build iOS app in Xcode (simulator)
        run: |
          xcodebuild \
            -workspace ios/PhoneRider.xcworkspace \
            -scheme PhoneRider \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build

  archive-ios:
    runs-on: macos-14
    needs: build-ios
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Archive iOS app (unsigned)
        run: |
          xcodebuild \
            -workspace ios/PhoneRider.xcworkspace \
            -scheme PhoneRider \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/PhoneRider.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Upload xcarchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhoneRider-xcarchive
          path: ${{ runner.temp }}/PhoneRider.xcarchive
